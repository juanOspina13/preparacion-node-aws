AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Metrics API — serverless backend

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        LOG_LEVEL: info
        DB_SSL: 'true'

Resources:
  # ── API Gateway ──────────────────────────────────────────────────────────────
  MetricsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  # ── Lambda — GET /metrics ────────────────────────────────────────────────────
  GetMetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: getMetrics.handler
      Description: Returns all metric records
      Events:
        GetMetrics:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics
            Method: GET
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ── Lambda — POST /metrics ───────────────────────────────────────────────────
  CreateMetricFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: createMetric.handler
      Description: Creates a new metric record
      Events:
        CreateMetric:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics
            Method: POST
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ── Lambda — PUT /metrics/{id} ───────────────────────────────────────────────
  ReplaceMetricFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: replaceMetric.handler
      Description: Fully replaces a metric record by id
      Events:
        ReplaceMetric:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/{id}
            Method: PUT
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ── Lambda — PATCH /metrics/{id} ─────────────────────────────────────────────
  UpdateMetricFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: updateMetric.handler
      Description: Partially updates a metric record by id
      Events:
        UpdateMetric:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/{id}
            Method: PATCH
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ── Lambda — DELETE /metrics/{id} ────────────────────────────────────────────
  DeleteMetricFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: deleteMetric.handler
      Description: Deletes a metric record by id
      Events:
        DeleteMetric:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/{id}
            Method: DELETE
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

Outputs:
  MetricsApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${MetricsApi}.execute-api.${AWS::Region}.amazonaws.com/prod/metrics'
