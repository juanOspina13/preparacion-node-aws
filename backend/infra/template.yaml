AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Metrics API — serverless backend

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        LOG_LEVEL: info
        DB_SSL: 'true'
        S3_BUCKET: gym-connect-bucket

Resources:
  # ── API Gateway ──────────────────────────────────────────────────────────────
  MetricsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      BinaryMediaTypes:
        - 'multipart/form-data'
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  # ── Lambda — GET /metrics ────────────────────────────────────────────────────
  GetMetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: getMetrics.handler
      Description: Returns all metric records
      Events:
        GetMetrics:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics
            Method: GET
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ── Lambda — POST /metrics ───────────────────────────────────────────────────
  CreateMetricFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: createMetric.handler
      Description: Creates a new metric record
      Events:
        CreateMetric:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics
            Method: POST
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ── Lambda — PUT /metrics/{id} ───────────────────────────────────────────────
  ReplaceMetricFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: replaceMetric.handler
      Description: Fully replaces a metric record by id
      Events:
        ReplaceMetric:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/{id}
            Method: PUT
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ── Lambda — PATCH /metrics/{id} ─────────────────────────────────────────────
  UpdateMetricFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: updateMetric.handler
      Description: Partially updates a metric record by id
      Events:
        UpdateMetric:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/{id}
            Method: PATCH
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ── Lambda — DELETE /metrics/{id} ────────────────────────────────────────────
  DeleteMetricFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: deleteMetric.handler
      Description: Deletes a metric record by id
      Events:
        DeleteMetric:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/{id}
            Method: DELETE
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # ── Lambda — POST /folders ───────────────────────────────────────────────────
  CreateFolderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: createFolder.handler
      Description: Creates an empty folder prefix in S3
      Events:
        CreateFolder:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /folders
            Method: POST
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'
            - Effect: Allow
              Action: s3:PutObject
              Resource: arn:aws:s3:::gym-connect-bucket/img/*

  # ── Lambda — POST /folders/upload ────────────────────────────────────────────
  UploadFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/
      Handler: uploadFile.handler
      Description: Uploads a file to an S3 folder under img/
      Events:
        UploadFile:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /folders/upload
            Method: POST
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'
            - Effect: Allow
              Action: s3:PutObject
              Resource: arn:aws:s3:::gym-connect-bucket/img/*

Outputs:
  MetricsApiUrl:
    Description: API Gateway endpoint URL — metrics
    Value: !Sub 'https://${MetricsApi}.execute-api.${AWS::Region}.amazonaws.com/prod/metrics'
  FoldersApiUrl:
    Description: API Gateway endpoint URL — folders
    Value: !Sub 'https://${MetricsApi}.execute-api.${AWS::Region}.amazonaws.com/prod/folders'
